{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Live Location Tracker</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    #status { margin-bottom: 10px; color: green; }
    #notifyBtn {
      padding: 10px 15px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #notifyBtn:hover { background-color: #0056b3; }
  </style>
</head>
<body>
  <h1>Live GPS Tracker</h1>
  <p id="status">Requesting location...</p>
  <p><strong>Latitude:</strong> <span id="lat">--</span></p>
  <p><strong>Longitude:</strong> <span id="lng">--</span></p>
  <p><strong>Accuracy:</strong> <span id="accuracy">--</span> meters</p>
  <p><strong>Speed:</strong> <span id="speed">--</span> m/s</p>
  <p><strong>Heading:</strong> <span id="heading">--</span>°</p>
  <p><strong>Last Updated:</strong> <span id="timestamp">--</span></p>

  <button id="notifyBtn">Send Notification</button>
  <script src="{% static 'js/webpush.js' %}"></script>
  <script>
    if ("geolocation" in navigator) {
      const latSpan = document.getElementById("lat");
      const lngSpan = document.getElementById("lng");
      const accSpan = document.getElementById("accuracy");
      const spdSpan = document.getElementById("speed");
      const hdgSpan = document.getElementById("heading");
      const tsSpan = document.getElementById("timestamp");
      const status = document.getElementById("status");

      navigator.geolocation.watchPosition(
        (position) => {
          const { latitude, longitude, accuracy, speed, heading } = position.coords;
          const timestamp = new Date(position.timestamp).toLocaleTimeString();
          latSpan.textContent = latitude.toFixed(6);
          lngSpan.textContent = longitude.toFixed(6);
          accSpan.textContent = accuracy;
          spdSpan.textContent = speed !== null ? speed.toFixed(2) : "--";
          hdgSpan.textContent = heading !== null ? heading.toFixed(2) : "--";
          tsSpan.textContent = timestamp;
          status.textContent = "Live location tracking...";
          status.style.color = "green";
        },
        (err) => {
          console.error("Error watching position:", err);
          status.textContent = "Unable to get location: " + err.message;
          status.style.color = "red";
        },
        { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
      );
    } else {
      document.getElementById("status").textContent = "Geolocation not supported.";
    }

    // WebPush subscription
    async function webPushSubscribe(registration, vapidKey) {
      const subscription = await registration.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(vapidKey),
      });

      console.log("keys:", urlBase64ToUint8Array(vapidKey));
      console.log("subscription: ", subscription);

      // Send to backend (optional)
      await fetch("/webpush/save_information/", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": "{{ csrf_token }}"
        },
        body: JSON.stringify(subscription)
      });
      console.log(JSON.stringify(subscription));
    }

    // Convert VAPID key
    // Utility: convert base64 public key to Uint8Array
function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding)
        .replace(/\-/g, '+')
        .replace(/_/g, '/');

    const rawData = window.atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; ++i) {
        outputArray[i] = rawData.charCodeAt(i);
    }
    return outputArray;
}

// 👇 paste your NEW public VAPID key here (from settings.py)
const vapidPublicKey = "BMov4lzyLO5ZFKs5uuCXHtmE0yo6Z7-cTpth3oQVrgWroh07h0lQM6neggYlc8AGd5vj0cunf_QwmB0Gqhgb44Q";

async function initPush() {
    if (!("serviceWorker" in navigator)) {
        console.error("Service workers are not supported in this browser");
        return;
    }

    try {
        // Register service worker
        const registration = await navigator.serviceWorker.register("/service_worker.js");
        console.log("✅ Service Worker registered");

        // Check for old subscription
        let oldSub = await registration.pushManager.getSubscription();
        if (oldSub) {
            console.log("⚠️ Unsubscribing old subscription...");
            await oldSub.unsubscribe();
        }

        // Subscribe with new VAPID key
        const newSub = await registration.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array(vapidPublicKey)
        });

        console.log("✅ New subscription created:", newSub);

        // Send to backend
        await fetch("/save_subscription/", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(newSub)
        });
        console.log(JSON.stringify(newSub));
        console.log("✅ Subscription sent to backend");

    } catch (err) {
        console.error("❌ Push subscription error:", err);
    }
}

// Run as soon as page loads
initPush();

    // Register SW
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("{% static 'js/service-worker.js' %}")
        .then(function (registration) {
          console.log("Service Worker registered");
          webPushSubscribe(registration, "{{ vapid_public_key|safe }}");
        })
        .catch(function (error) {
          console.error("Service Worker registration failed:", error);
        });
    }

    // Trigger notification
    document.getElementById("notifyBtn").addEventListener("click", () => {
      fetch("/send_notification/", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": getCookie("csrftoken")  //"{{ csrf_token }}"
        },
        credentials: "include",
        body: JSON.stringify({
          title: "Live Location Alert",
          message: "Your GPS position has been updated."
        })
      }).then(response => {
        if (response.ok) {
          //alert("Notification sent!");
        } else {
          //alert("Failed to send notification.");
        }
      });
    });

    function getCookie(name) {
  let cookieValue = null;
  if (document.cookie && document.cookie !== "") {
    const cookies = document.cookie.split(";");
    for (let i = 0; i < cookies.length; i++) {
      const cookie = cookies[i].trim();
      // Does this cookie string begin with the name we want?
      if (cookie.startsWith(name + "=")) {
        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
        break;
      }
    }
  }
  return cookieValue;
}

  </script>
</body>
</html>
