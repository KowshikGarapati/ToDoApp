{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Task List</title>

  <!-- W3.CSS and Font Awesome -->
  <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Montserrat" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />

  <style>
    * {
      box-sizing: border-box;
    }

    body, h1, h2, h3, h4, h5, h6 {
      font-family: "Montserrat", sans-serif;
    }

    body {
      background: #f5f5f5;
      margin: 0;
    }

    .w3-sidebar {
      width: 120px;
      background: #222;
      position: fixed;
      top: 0;
      left: 0;
      height: 100%;
    }

    #main {
      margin-left: 120px;
      padding: 16px;
    }

    @media only screen and (max-width: 768px) {
      .w3-sidebar {
        display: none !important;
      }

      #main {
        margin-left: 0;
      }

      .task-actions {
        flex-direction: row;
        justify-content: flex-end;
        gap: 10px;
        width: 100%;
        margin-top: 10px;
      }
    }

    .task {
      width: 100%;
      background-color: white;
      border: 1px solid #ccc;
      border-radius: 8px;
      margin-bottom: 15px;
      padding: 12px 16px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
    }

    .task-info {
      flex-grow: 1;
      min-width: 200px;
    }

    .task-title {
      font-weight: bold;
      font-size: 1.1em;
      margin-bottom: 5px;
    }

    .task-details {
      font-size: 0.9em;
      color: #555;
      word-wrap: break-word;
    }

    .task-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-left: 16px;
    }

    .task-actions button {
      padding: 6px 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background-color: #007BFF;
      color: white;
    }

    .task-actions button:hover {
      background-color: #0056b3;
    }

    .w3-top .w3-bar {
      overflow-x: auto;
      white-space: nowrap;
    }

    .new-task-button {
      margin-top: 20px;
      padding: 10px 16px;
      background-color: #28a745;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .new-task-button:hover {
      background-color: #1e7e34;
    }
  </style>
</head>
<body class="w3-white">
<script src="{% static 'webpush/webpush.js' %}"></script>
<!-- Sidebar -->
<nav class="w3-sidebar w3-bar-block w3-small w3-hide-small w3-center">
  <img src="" style="width:100%">
  <a href="#" class="w3-bar-item w3-button w3-padding-large w3-black">
    <i class="fa fa-home w3-xxlarge"></i>
    <p>HOME</p>
  </a>
  <a href="#about" class="w3-bar-item w3-button w3-padding-large w3-hover-black">
    <i class="fa fa-user w3-xxlarge"></i>
    <p>ABOUT</p>
  </a>
  <a href="#photos" class="w3-bar-item w3-button w3-padding-large w3-hover-black">
    <i class="fa fa-eye w3-xxlarge"></i>
    <p>PHOTOS</p>
  </a>
  <a href="#contact" class="w3-bar-item w3-button w3-padding-large w3-hover-black">
    <i class="fa fa-envelope w3-xxlarge"></i>
    <p>CONTACT</p>
  </a>
  <a href="{% url 'logout' %}" class="w3-bar-item w3-button w3-padding-large w3-hover-black">
    <i class="fa fa-sign-out w3-xxlarge"></i>
    <p>LOGOUT</p>
  </a>
</nav>

<!-- Top Navbar for Small Screens -->
<div class="w3-top w3-hide-large w3-hide-medium" id="myNavbar">
  <div class="w3-bar w3-black w3-opacity w3-hover-opacity-off w3-center w3-small">
    <a href="#" class="w3-bar-item w3-button" style="width:25% !important">HOME</a>
    <a href="#about" class="w3-bar-item w3-button" style="width:25% !important">ABOUT</a>
    <a href="#photos" class="w3-bar-item w3-button" style="width:25% !important">PHOTOS</a>
    <a href="#contact" class="w3-bar-item w3-button" style="width:25% !important">CONTACT</a>
  </div>
</div>

<!-- Main Page Content -->
<div class="w3-padding-large" id="main">
  {% for task in tasks %}
    <div class="task">
      <div class="task-info">
        <div class="task-title">{{ task.title }}</div>
        <div class="task-details">{{ task.description }} | {{ task.date }} | {{ task.time }}</div>
      </div>
      <div class="task-actions">
        <button onclick="window.location.href = 'http://127.0.0.1:8000/tasks/edit/{{ task.id }}/'">Edit</button>
        <button onclick="window.location.href = 'http://127.0.0.1:8000/tasks/delete/{{ task.id }}/'">Delete</button>
      </div>
    </div>
  {% endfor %}

  <button class="new-task-button" onclick="window.location.href = 'http://127.0.0.1:8000/tasks/new/'">New Task</button>

  <!-- Footer -->
  <footer class="w3-content w3-padding-64 w3-text-grey w3-xlarge">
    <i class="fa fa-facebook-official w3-hover-opacity"></i>
    <i class="fa fa-instagram w3-hover-opacity"></i>
    <i class="fa fa-snapchat w3-hover-opacity"></i>
    <i class="fa fa-pinterest-p w3-hover-opacity"></i>
    <i class="fa fa-twitter w3-hover-opacity"></i>
    <i class="fa fa-linkedin w3-hover-opacity"></i>
    <p class="w3-medium">Powered by <a href="https://www.w3schools.com/w3css/default.asp" target="_blank" class="w3-hover-text-green">w3.css</a></p>
  </footer>
</div>

</body>
</html>
