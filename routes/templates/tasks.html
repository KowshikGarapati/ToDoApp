<script>
  function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371e3; // meters

    const toRad = (deg) => deg * Math.PI / 180;

    const φ1 = toRad(lat1);
    const φ2 = toRad(lat2);
    const Δφ = toRad(lat2 - lat1);
    const Δλ = toRad(lon2 - lon1);

    const a =
        Math.sin(Δφ / 2) * Math.sin(Δφ / 2) +
        Math.cos(φ1) * Math.cos(φ2) *
        Math.sin(Δλ / 2) * Math.sin(Δλ / 2);

    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

    return R * c; // distance in meters
}

function getCookie(name) {
  let cookieValue = null;
  if (document.cookie && document.cookie !== "") {
    const cookies = document.cookie.split(";");
    for (let i = 0; i < cookies.length; i++) {
      const cookie = cookies[i].trim();
      // Does this cookie string begin with the name we want?
      if (cookie.startsWith(name + "=")) {
        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
        break;
      }
    }
  }
  return cookieValue;
}

function send_location_triggered_notification(task){
    fetch(`/send_location_triggered_notification/${task.id}/`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-CSRFToken": getCookie("csrftoken")  //"{{ csrf_token }}"
        },
        credentials: "include",
        /*body: JSON.stringify({

          message: "Your GPS position has been updated."
        })*/
      }).then(response => {
        if (response.ok) {
          //alert("Notification sent!");
        } else {
          //alert("Failed to send notification.");
        }
      });
}
  const tasks = JSON.parse(
    document.getElementById("tasks-data").textContent 
  );

if ("geolocation" in navigator) {
  navigator.geolocation.watchPosition(
        (position) => {
          const { latitude, longitude, accuracy, speed, heading } = position.coords;
          const timestamp = new Date(position.timestamp).toLocaleTimeString();
          
          tasks.forEach(task => {
            distance = getDistance(latitude, longitude, task.lat, task.lon);
            if(distance < 200){
              send_location_triggered_notification(task.id);
            }
          })
        },
        (err) => {
          console.error("Error watching position:", err);
          status.textContent = "Unable to get location: " + err.message;
          status.style.color = "red";
        },
        { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
      );
    } else {
      document.getElementById("status").textContent = "Geolocation not supported.";
    }
  
</script>
